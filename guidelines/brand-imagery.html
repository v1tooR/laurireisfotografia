<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--lr-paper); padding: 18px; display:flex; gap: 14px; }
  .frame { position: relative; flex: 1; height: 200px; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-md); }
  .frame img { width: 100%; height: 100%; object-fit: cover; display:block; }
  .scrim { position:absolute; inset:0; background: var(--scrim-bottom); }
  .cap { position:absolute; left: 16px; bottom: 14px; }
  .cap .eb { font-size: 10px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color: var(--lr-gold); }
  .cap .ti { font-family: var(--font-display); font-size: 22px; color:#fff; line-height:1.1; margin-top:3px; }
</style>
</head>
<body>
  <div class="frame">
    <img src="../assets/imagery/newborn.jpg" alt="">
    <div class="scrim"></div>
    <div class="cap"><div class="eb">Newborn</div><div class="ti">Lifestyle</div></div>
  </div>
  <div class="frame">
    <img src="../assets/imagery/15-anos.jpg" alt="">
    <div class="scrim"></div>
    <div class="cap"><div class="eb">Debutante</div><div class="ti">15 Anos</div></div>
  </div>
  <div class="frame">
    <img src="../assets/imagery/ensaio-externo.jpg" alt="">
    <div class="scrim"></div>
    <div class="cap"><div class="eb">Ensaio</div><div class="ti">Externo</div></div>
  </div>
</body>
</html>
