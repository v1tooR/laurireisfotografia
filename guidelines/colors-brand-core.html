<!-- @dsCard group="Colors" viewport="700x200" name="Brand Core" subtitle="Navy, gold, slate & rose — the signature palette" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--lr-paper); }
  .wrap { display: flex; gap: 14px; padding: 24px; }
  .sw { flex: 1; }
  .chip { height: 92px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
  .name { font-size: 12px; font-weight: 600; color: var(--lr-navy-deep); margin-top: 10px; letter-spacing: 0.04em; }
  .hex { font-size: 11px; color: var(--lr-ink-400); font-variant-numeric: tabular-nums; margin-top: 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:#0F2030"></div><div class="name">Navy Deep</div><div class="hex">#0F2030</div></div>
    <div class="sw"><div class="chip" style="background:#1E3448"></div><div class="name">Navy</div><div class="hex">#1E3448</div></div>
    <div class="sw"><div class="chip" style="background:#C8A84B"></div><div class="name">Gold</div><div class="hex">#C8A84B</div></div>
    <div class="sw"><div class="chip" style="background:#A8BECE"></div><div class="name">Slate</div><div class="hex">#A8BECE</div></div>
    <div class="sw"><div class="chip" style="background:#DDB8B8"></div><div class="name">Rose</div><div class="hex">#DDB8B8</div></div>
  </div>
</body>
</html>
