<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8px base grid" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--lr-paper); padding: 24px 32px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .u { text-align: center; }
  .bar { background: var(--lr-gold); border-radius: 2px; width: 26px; }
  .lab { font-size: 10px; color: var(--lr-ink-400); margin-top: 8px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="bar" style="height:8px"></div><div class="lab">8</div></div>
    <div class="u"><div class="bar" style="height:12px"></div><div class="lab">12</div></div>
    <div class="u"><div class="bar" style="height:16px"></div><div class="lab">16</div></div>
    <div class="u"><div class="bar" style="height:24px"></div><div class="lab">24</div></div>
    <div class="u"><div class="bar" style="height:32px"></div><div class="lab">32</div></div>
    <div class="u"><div class="bar" style="height:48px"></div><div class="lab">48</div></div>
    <div class="u"><div class="bar" style="height:64px"></div><div class="lab">64</div></div>
    <div class="u"><div class="bar" style="height:96px"></div><div class="lab">96</div></div>
  </div>
</body>
</html>
