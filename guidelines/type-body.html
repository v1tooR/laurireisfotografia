<!-- @dsCard group="Type" viewport="700x240" name="Body — Montserrat" subtitle="Light / Regular / Bold for text & descriptions" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--lr-paper); padding: 26px 32px; color: var(--lr-navy-deep); }
  .lead { font-size: 18px; font-weight: 300; line-height: 1.6; color: var(--lr-ink-600); max-width: 560px; }
  .body { font-size: 14px; font-weight: 400; line-height: 1.65; color: var(--lr-ink-600); max-width: 560px; margin-top: 12px; }
  .weights { display:flex; gap: 22px; margin-top: 18px; }
  .w { font-size: 18px; }
  .w span { display:block; font-size: 10px; color: var(--lr-ink-400); letter-spacing:.12em; text-transform:uppercase; margin-top:4px; }
</style>
</head>
<body>
  <p class="lead">Cada ensaio começa com uma conversa — entender quem você é antes de apontar a câmera.</p>
  <p class="body">Texto informativo e descritivo usa Montserrat Regular, com entrelinha generosa para leitura confortável em blocos mais longos de conteúdo.</p>
  <div class="weights">
    <div class="w" style="font-weight:300">Light<span>300</span></div>
    <div class="w" style="font-weight:400">Regular<span>400</span></div>
    <div class="w" style="font-weight:600">Semibold<span>600</span></div>
    <div class="w" style="font-weight:700">Bold<span>700</span></div>
  </div>
</body>
</html>
