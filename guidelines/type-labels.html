<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--lr-navy-deep); padding: 30px 32px; }
  .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--lr-gold); }
  .nav { font-size: 13px; font-weight: 500; letter-spacing: var(--ls-label-tight); text-transform: uppercase; color: var(--lr-white); margin-top: 18px; display:flex; gap: 28px; }
  .nav span { opacity: .82; }
</style>
</head>
<body>
  <div class="eyebrow">Ensaio · Estúdio</div>
  <div class="nav"><span>Início</span><span>Serviços</span><span>Portfólio</span><span>Contato</span></div>
</body>
</html>
